name: Deploy to GitHub Pages

# Publishes the static site in public/ to GitHub Pages. There is no build step
# (plain HTML/CSS), so this uploads public/ verbatim as the Pages artifact.
# Actions (not "deploy from a branch") is used because branch mode can only
# serve the repo root or /docs, whereas the site lives in public/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # enablement: true turns Pages on via the API (build type = workflow) if
      # it isn't already, so the first run doesn't fail with "Get Pages site
      # failed / Not Found" before anyone flips the Settings -> Pages toggle.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - id: deployment
        uses: actions/deploy-pages@v4
