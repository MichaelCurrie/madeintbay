name: Deploy to GitHub Pages

# Publishes the static site in public/ to GitHub Pages. Before upload,
# scripts/embed_jsonld.mjs rewrites the JSON-LD block in index.html from
# sites.csv so crawlers/validators that do not execute JS still see Schema.org
# markup. Actions (not "deploy from a branch") is used because branch mode can
# only serve the repo root or /docs, whereas the site lives in public/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Requires Pages to be enabled with Source = GitHub Actions in the repo
      # Settings first (the workflow token can't create the Pages site itself:
      # "Resource not accessible by integration").
      - uses: actions/configure-pages@v6
      - name: Embed JSON-LD from sites.csv
        run: node scripts/embed_jsonld.mjs
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
      - id: deployment
        uses: actions/deploy-pages@v5
